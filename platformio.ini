[env:ATmega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino
upload_speed = 115200
monitor_speed = 115200
monitor_filters = default
; Using latest here: https://github.com/ZakKemble/avr-gcc-build/releases/ to get nice c++ features
platform_packages = toolchain-atmelavr@${sysenv.PIO_AVR_GCC_PATH}
build_unflags = -std=gnu++11 -std=gnu++14 -std=gnu++17
build_flags = -std=gnu++2


